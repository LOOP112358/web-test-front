<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动画偏好分析器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>动画偏好分析器</h1>
        
        <!-- 输入区域 -->
        <div class="input-group">
            <input type="text" id="anime" placeholder="你最喜欢的动画是？">
            <input type="text" id="character" placeholder="你最喜欢的角色是？">
            <button id="analyzeBtn">生成分析报告</button>
        </div>

        <!-- 输出区域 -->
        <div id="report" class="report hidden">
            <h2>你的分析报告</h2>
            <p id="resultText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
